<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>社工的一日：一個都不漏接？</title>
    <link rel="stylesheet" href="src/styles/main.css" />
  </head>
  <body>
    <section id="screen-home" class="screen-home home-screen">
      <div class="hero-cover">
        <p class="eyebrow">社工小遊戲</p>
        <h1 id="game-title">《社工的一日：一個都不漏接？》</h1>
        <figure class="hero-image-frame">
          <img
            src="assets/hero-social-worker-day.png"
            alt="《社工的一日：一個都不漏接？》遊戲主視覺"
            onerror="this.hidden=true; this.parentElement.classList.add('hero-image-missing');"
          />
        </figure>
        <p class="subtitle">60 秒內，在危機、文件與自我耗竭之間撐住一天。</p>
        <div class="home-actions">
          <button id="start-button" class="start-button" type="button">開始今天的挑戰</button>
          <button id="rules-from-home-button" class="secondary-button" type="button">玩法說明</button>
        </div>
      </div>
    </section>

    <section id="screen-rules" class="screen-rules guide-screen" hidden>
      <div class="guide-panel">
        <figure class="guide-image-wrap">
          <img
            class="guide-image"
            src="assets/images/game-guide.png"
            alt="《社工的一日：一個都不漏接？》遊戲說明"
            onerror="this.hidden=true; this.parentElement.classList.add('guide-image-missing');"
          />
        </figure>
        <div class="guide-actions">
          <button id="begin-level-button" class="start-button guide-start-button" type="button">開始第一關</button>
          <button id="back-home-button" class="secondary-button guide-back-button" type="button">返回首頁</button>
        </div>
      </div>
    </section>

    <section id="screen-game" class="game-screen" hidden>
      <div id="game-stage" class="game-stage">
      <header class="status-bar" aria-label="狀態列">
        <article class="status-card status-life">
          <div class="status-heading"><span>❤️ 生命</span><strong id="worker-life-value">100</strong></div>
          <div class="meter"><span id="worker-life-meter" style="width: 100%"></span></div>
        </article>
        <article class="status-card status-case-pressure">
          <div class="status-heading"><span>😵 個案壓力</span><strong id="case-pressure-value">20</strong></div>
          <div class="meter"><span id="case-pressure-meter" style="width: 20%"></span></div>
        </article>
        <article class="status-card status-doc-pressure">
          <div class="status-heading"><span>📄 文件壓力</span><strong id="doc-pressure-value">20</strong></div>
          <div class="meter"><span id="doc-pressure-meter" style="width: 20%"></span></div>
        </article>
        <article class="status-card status-network-pressure">
          <div class="status-heading"><span>🕸️ 網絡壓力</span><strong id="network-pressure-value">20</strong></div>
          <div class="meter"><span id="network-pressure-meter" style="width: 20%"></span></div>
        </article>
      </header>

      <section class="game-layout">
        <section class="map-area" aria-label="遊戲地圖">
          <div class="tutorial-box"><p>碰到任務卡，送到同色工作區。</p></div>

          <div id="desk-zone" class="zone zone-desk" data-zone="desk">
            <div class="zone-header">📋 辦公桌</div>
            <div class="zone-hint">文件壓力</div>
          </div>
          <div id="service-zone" class="zone zone-service" data-zone="service">
            <div class="zone-header">🧑 個案區</div>
            <div class="zone-hint">個案壓力</div>
          </div>
          <div id="crisis-zone" class="zone zone-crisis" data-zone="crisis">
            <div class="zone-header">🚨 危機區</div>
            <div class="zone-hint">個案壓力</div>
          </div>
          <div id="meeting-zone" class="zone zone-meeting" data-zone="meeting">
            <div class="zone-header">🤝 會議室</div>
            <div class="zone-hint">網絡壓力</div>
          </div>
          <div id="rest-zone" class="zone zone-rest" data-zone="rest">
            <div class="zone-header">☕ 休息室</div>
            <div class="zone-hint">自動休息</div>
            <div class="rest-progress"><span id="rest-progress-fill"></span></div>
          </div>

          <div class="player" aria-label="社工角色">
            <span class="player-avatar-wrap" aria-hidden="true">
              <img
                class="player-avatar"
                src="assets/images/social-worker-avatar.png"
                alt=""
                draggable="false"
              />
            </span>
            <span class="player-label">社工</span>
          </div>

          <div id="task-layer" class="task-layer" aria-label="地圖任務"></div>
          <button id="help-button" class="help-button" type="button">？玩法</button>
          <div id="game-message" class="game-message is-muted" aria-live="polite"></div>
        </section>

        <aside class="side-panel" aria-label="任務與目標">
          <section class="goal-panel">
            <h2>第一關</h2>
            <p>⏱ 撐過 60 秒</p>
            <p id="goal-completed">✅ 達成KPI 0 / 15</p>
            <p id="goal-pressure">🔥 壓力別爆表</p>
          </section>

          <section class="hand-panel">
            <h2>手上任務</h2>
            <div id="load-summary" class="load-summary">負荷 0 / 10</div>
            <div id="load-warning" class="load-warning" aria-live="polite"></div>
            <div id="hand-list" class="hand-list empty">目前手上沒有任務</div>
          </section>

          <button id="debug-toggle" class="debug-toggle" type="button">DEBUG</button>
          <aside id="debug-panel" class="debug-panel" hidden></aside>
        </aside>
      </section>

      </div>

      <div id="mobile-controls" class="mobile-controls" aria-label="手機方向控制">
        <button type="button" data-key="ArrowUp">▲</button>
        <button type="button" data-key="ArrowLeft">◀</button>
        <button type="button" data-key="ArrowRight">▶</button>
        <button type="button" data-key="ArrowDown">▼</button>
      </div>
    </section>

    <section id="screen-result" hidden></section>

    <section id="orientation-overlay" class="orientation-overlay" aria-live="polite">
      <div class="orientation-card">
        <div class="orientation-icon" aria-hidden="true">📱↔️</div>
        <h2>請將手機轉為橫向</h2>
        <p>橫向畫面會比較適合遊玩</p>
      </div>
    </section>

    <script src="src/app.js"></script>
  </body>
</html>
